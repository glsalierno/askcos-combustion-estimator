name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install -e ".[viz]"

      - name: Ruff (lint + format check)
        run: |
          ruff format --check .
          ruff check .

      - name: Vulture (dead code, min confidence 80%)
        run: |
          vulture . vulture_whitelist.py --min-confidence=80 \
            --exclude tests --exclude validation --exclude venv --exclude __pycache__ \
            --exclude build --exclude dist \
            --sort-by-size

      - name: Tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-config=.coveragerc \
            --cov-report=term-missing --cov-report=xml

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-xml-py311
          path: coverage.xml
