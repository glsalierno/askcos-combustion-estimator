<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 108" width="1280" height="108" role="img" aria-labelledby="bannerTitle bannerDesc">
  <title id="bannerTitle">ASKCOS Combustion Estimator</title>
  <desc id="bannerDesc">Banner: predict fuel properties with the chemical kinetics API.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#010409"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.12"/>
      <stop offset="45%" stop-color="#ff6b35" stop-opacity="0.45"/>
      <stop offset="75%" stop-color="#58a6ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff6b35" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#79c0ff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style type="text/css"><![CDATA[
      .title { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 700; letter-spacing: -0.02em; }
      .subtitle { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-weight: 400; letter-spacing: 0.03em; opacity: 0.9; }
      .badge { font-family: ui-monospace, "Cascadia Mono", "SF Mono", Menlo, Monaco, Consolas, monospace; font-size: 11px; letter-spacing: 0.04em; opacity: 0.95; }
      .pulseOrange { animation: pulseOrange 4.5s ease-in-out infinite; }
      .pulseBlue { animation: pulseBlue 5s ease-in-out infinite; }
      @keyframes pulseOrange { 0%, 100% { opacity: 0.45; } 50% { opacity: 0.95; } }
      @keyframes pulseBlue { 0%, 100% { opacity: 0.4; } 45% { opacity: 0.9; } }
    ]]></style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgGrad)"/>

  <g opacity="0.07" stroke="#58a6ff" stroke-width="0.75">
    <path d="M0 54 H1280 M320 0 V108 M640 0 V108 M960 0 V108"/>
  </g>

  <!-- Low profile energy arc behind lower text -->
  <path d="M 40 92 Q 320 76 640 86 T 1240 90" fill="none" stroke="url(#arcGrad)" stroke-width="2.25" stroke-linecap="round" opacity="0.75">
    <animate attributeName="opacity" values="0.55;0.88;0.55" dur="6s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#softGlow)" opacity="0.95">
    <line x1="3%" y1="50%" x2="10%" y2="50%" stroke="#30363d" stroke-width="1.25"/>
    <line x1="90%" y1="50%" x2="97%" y2="50%" stroke="#30363d" stroke-width="1.25"/>
    <circle cx="3%" cy="50%" r="5" fill="#21262d" stroke="#ff6b35" stroke-width="1"/>
    <circle cx="10%" cy="50%" r="7" fill="url(#nodeGlow)" class="pulseOrange"/>
    <circle cx="90%" cy="50%" r="6" fill="url(#nodeGlowBlue)" class="pulseBlue"/>
    <circle cx="97%" cy="50%" r="4" fill="#21262d" stroke="#79c0ff" stroke-width="1"/>
  </g>

  <g fill="#79c0ff" opacity="0.28">
    <circle r="1.5" cx="18%" cy="82%">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.25" cx="84%" cy="78%">
      <animate attributeName="opacity" values="0.12;0.38;0.12" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Typography: large relative to strip height (~2× README H1 when img is full width) -->
  <g transform="translate(640, 48)" text-anchor="middle">
    <text class="title" fill="#f0f6fc" font-size="48" filter="url(#textGlow)">ASKCOS Combustion Estimator</text>
    <text class="subtitle" fill="#8b949e" font-size="17.5" y="30">Predict fuel properties with the chemical kinetics API</text>
  </g>

  <text class="badge" x="640" y="102" text-anchor="middle" fill="#8b949e">
    GitHub · glsalierno/askcos-combustion-estimator
  </text>
</svg>
